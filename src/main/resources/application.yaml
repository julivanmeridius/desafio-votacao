server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    br.com.company.votacao: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

spring:
  application:
    name: votacao-backend
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
  threads:
    virtual:
      enabled: true
  main:
    web-application-type: servlet
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:votacao}
    username: ${DB_USR:postgres}
    password: ${DB_PASS:masterkey}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    baseline-on-migrate: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

